<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC Wiki</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; }
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.1);
}
.input {
    background:#020617;
    border:1px solid #1e293b;
    padding:10px;
    border-radius:8px;
    width:100%;
}
</style>
</head>

<body class="p-4 pb-24">

<!-- HEADER -->
<div class="flex justify-between items-center mb-4">
    <h1 class="text-xl font-bold text-cyan-400">CSC Heroes</h1>
    <button id="adminBtn" class="hidden bg-red-500 px-3 py-1 rounded">ADMIN</button>
</div>

<!-- SEARCH -->
<input id="search" placeholder="Поиск героя..." class="input mb-4">

<!-- HERO LIST -->
<div id="heroesPage" class="grid grid-cols-2 gap-3"></div>

<!-- ADMIN PAGE -->
<div id="adminPage" class="hidden">

    <h2 class="text-lg font-bold mb-4">Админ панель</h2>

    <input id="h_name" class="input mb-2" placeholder="Имя">
    <input id="h_class" class="input mb-2" placeholder="Класс">
    <input id="h_hp" class="input mb-2" placeholder="HP">
    <input id="h_dmg" class="input mb-2" placeholder="Damage">
    <input id="h_icon" class="input mb-2" placeholder="Icon URL">
    <input id="h_video" class="input mb-2" placeholder="Video URL">
    <textarea id="h_desc" class="input mb-2" placeholder="Описание"></textarea>

    <div class="flex gap-2 mt-3">
        <button onclick="saveHero('draft')" class="bg-yellow-500 px-3 py-2 rounded w-full">Сохранить</button>
        <button onclick="saveHero('published')" class="bg-green-600 px-3 py-2 rounded w-full">Опубликовать</button>
    </div>

    <button onclick="clearForm()" class="bg-red-600 mt-3 w-full py-2 rounded">Очистить</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyIhcHgJwn8VFtDiu5rSJBsNX18BM7zTEeXTr3-d8svz3WzNouV8lAAxnjZOXDIERut/exec";

// 🔐 ТВОЙ ID
const ADMIN_ID = "2114339294";

// сохраняем ID
let USER_ID = localStorage.getItem("user_id");

if (!USER_ID) {
    USER_ID = prompt("2114339294");
    localStorage.setItem("user_id", USER_ID);
}

const isAdmin = USER_ID === ADMIN_ID;

// показать кнопку админа
if (isAdmin) {
    document.getElementById("adminBtn").classList.remove("hidden");
}

// переключение страниц
document.getElementById("adminBtn").onclick = () => {
    document.getElementById("heroesPage").classList.add("hidden");
    document.getElementById("adminPage").classList.remove("hidden");
};

// поиск
document.getElementById("search").addEventListener("input", loadHeroes);

// загрузка героев
async function loadHeroes() {
    const res = await fetch(API_URL);
    const data = await res.json();

    const list = document.getElementById("heroesPage");
    list.innerHTML = "";

    const search = document.getElementById("search").value.toLowerCase();

    data.forEach(hero => {

        if (hero.status !== "published") return;

        if (hero.name.toLowerCase().includes(search)) {
            list.innerHTML += `
                <div class="glass p-3 rounded-xl text-center">
                    <img src="${hero.icon}" class="w-16 h-16 mx-auto mb-2 rounded">
                    <div class="font-bold">${hero.name}</div>
                    <div class="text-xs text-cyan-400">${hero.class_type}</div>
                </div>
            `;
        }
    });
}

// сохранение героя
async function saveHero(status) {

    const payload = {
        user_id: USER_ID,
        id: Date.now(),
        name: document.getElementById("h_name").value,
        class_type: document.getElementById("h_class").value,
        hp: document.getElementById("h_hp").value,
        damage: document.getElementById("h_dmg").value,
        magic: 0,
        icon: document.getElementById("h_icon").value,
        ability_name: "",
        video: document.getElementById("h_video").value,
        desc: document.getElementById("h_desc").value,
        status: status
    };

    await fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(payload)
    });

    alert("Сохранено");
    location.reload();
}

// очистка
function clearForm() {
    document.querySelectorAll("input, textarea").forEach(el => el.value = "");
}

// старт
loadHeroes();
</script>

</body>
</html>
