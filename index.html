<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSC Wiki</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background:#0f172a; color:white; font-family:sans-serif; }
        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border:1px solid rgba(255,255,255,0.1);
        }
        .input {
            background:#020617;
            border:1px solid #1e293b;
            padding:10px;
            border-radius:8px;
            width:100%;
            margin-bottom: 8px;
        }
        /* Анимация загрузки */
        .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-4 pb-24">

<div class="flex justify-between items-center mb-4">
    <h1 class="text-xl font-bold text-cyan-400">CSC Heroes</h1>
    <div class="flex items-center gap-3">
        <div id="syncStatus" class="text-[10px] text-gray-500">Обновлено</div>
        <button onclick="loadHeroes()" class="bg-slate-800 p-2 rounded-lg text-xs active:scale-95 transition">🔄</button>
    </div>
</div>

<input id="search" placeholder="Поиск героя..." class="input">

<div id="heroesPage" class="grid grid-cols-2 gap-3">
    <p id="loadingMsg" class="col-span-2 text-center text-gray-400 mt-10">Загрузка...</p>
</div>

<div id="discussPage" class="hidden text-center mt-10 text-gray-400">
    В разработке 🚧
</div>

<div id="adminPage" class="hidden">
    <h2 class="text-lg font-bold mb-4">Редактор Героя</h2>

    <input id="h_name" class="input" placeholder="Имя">
    <input id="h_class" class="input" placeholder="Класс">
    <div class="grid grid-cols-3 gap-2 mb-2">
        <input id="h_hp" type="number" class="input" placeholder="HP">
        <input id="h_dmg" type="number" class="input" placeholder="Damage">
        <input id="h_magic" type="number" class="input" placeholder="Magic %">
    </div>
    <input id="h_ability" class="input" placeholder="Название способности">
    <input id="h_icon" class="input" placeholder="Icon URL">
    <input id="h_video" class="input" placeholder="Video URL (YouTube/ID)">
    <textarea id="h_desc" class="input" placeholder="Описание (история, советы...)"></textarea>

    <div class="flex gap-2 mt-2">
        <button id="btnDraft" onclick="saveHero('draft')" class="bg-yellow-600 px-3 py-3 rounded-lg w-full font-bold">В черновик</button>
        <button id="btnPub" onclick="saveHero('published')" class="bg-cyan-600 px-3 py-3 rounded-lg w-full font-bold">Опубликовать</button>
    </div>
    
    <div class="flex gap-2 mt-4">
        <button id="btnDelete" onclick="deleteHero()" class="bg-red-900/50 border border-red-500 text-red-500 py-2 rounded-lg w-full text-sm font-bold hidden">Удалить карточку</button>
        <button onclick="clearForm()" class="bg-slate-800 text-gray-400 py-2 rounded-lg w-full text-sm">Очистить форму</button>
    </div>
    
    <h3 class="mt-8 mb-2 font-bold text-cyan-400 border-b border-cyan-900/50 pb-1">Опубликованные</h3>
    <div id="adminPublished" class="grid grid-cols-2 gap-2"></div>

    <h3 class="mt-6 mb-2 font-bold text-yellow-400 border-b border-yellow-900/50 pb-1">Черновики</h3>
    <div id="adminDrafts" class="grid grid-cols-2 gap-2"></div>
</div>

<script>
// Твоя рабочая ссылка
const API_URL = "https://script.google.com/macros/s/AKfycbxdH4UbZdGM0Ix_keYLnh_AnplSm3EptgNtt8y-2VmK_RINTbndvzaDifNi-WnbMWSq/exec";

let ALL_HEROES = [];
let currentHeroId = null;

// 1. УМНЫЙ КЭШ: Загрузка сразу при открытии
function loadFromCache() {
    const cached = localStorage.getItem('csc_cache');
    if (cached) {
        ALL_HEROES = JSON.parse(cached);
        renderHeroes();
        renderAdminLists();
    }
}

// 2. ЗАГРУЗКА ИЗ ГУГЛ ТАБЛИЦЫ (Фоновая)
async function loadHeroes() {
    const statusEl = document.getElementById("syncStatus");
    statusEl.innerText = "Синхронизация...";
    statusEl.classList.add("loading-pulse");

    try {
        // Добавляем ?t= к ссылке, чтобы данные на ПК и Телефоне были всегда свежими
        const res = await fetch(API_URL + "?t=" + Date.now());
        const data = await res.json();
        
        ALL_HEROES = data.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
        localStorage.setItem('csc_cache', JSON.stringify(ALL_HEROES));
        
        renderHeroes();
        renderAdminLists();
        
        statusEl.innerText = "Актуально: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        statusEl.classList.remove("loading-pulse");
        document.getElementById("loadingMsg")?.classList.add("hidden");
    } catch (e) {
        statusEl.innerText = "Ошибка сети";
    }
}

// 3. ОТРИСОВКА (Только опубликованные)
function renderHeroes() {
    const list = document.getElementById("heroesPage");
    const search = document.getElementById("search").value.toLowerCase();
    list.innerHTML = "";

    const filtered = ALL_HEROES.filter(h => 
        h.status === "published" && 
        (h.name || "").toLowerCase().includes(search)
    );

    if (filtered.length === 0) {
        list.innerHTML = `<p class="col-span-2 text-center text-gray-500 mt-10">Герои не найдены</p>`;
        return;
    }

    filtered.forEach(hero => {
        list.innerHTML += `
            <div class="glass p-3 rounded-xl text-center border-b-2 border-cyan-500/30">
                <img src="${hero.icon || 'https://via.placeholder.com/64'}" class="w-16 h-16 mx-auto mb-2 rounded-lg shadow-lg">
                <div class="font-bold text-sm">${hero.name}</div>
                <div class="text-[10px] text-cyan-400 uppercase tracking-wider">${hero.class_type || 'Боец'}</div>
            </div>
        `;
    });
}

// 4. СПИСКИ В АДМИНКЕ
function renderAdminLists() {
    const pub = document.getElementById("adminPublished");
    const draft = document.getElementById("adminDrafts");
    pub.innerHTML = ""; draft.innerHTML = "";

    ALL_HEROES.forEach(hero => {
        const card = `
            <div onclick="editHero(${hero.id})" class="glass p-2 text-center text-xs cursor-pointer hover:bg-white/10 transition">
                ${hero.name || "Без имени"}
            </div>
        `;
        if (hero.status === "published") pub.innerHTML += card;
        else draft.innerHTML += card;
    });
}

// 5. ВЫБОР ГЕРОЯ ДЛЯ РЕДАКТИРОВАНИЯ
function editHero(id) {
    const hero = ALL_HEROES.find(h => h.id == id);
    if (!hero) return;
    
    currentHeroId = hero.id; // Запоминаем ID, чтобы обновить ту же строку

    document.getElementById("h_name").value = hero.name || "";
    document.getElementById("h_class").value = hero.class_type || "";
    document.getElementById("h_hp").value = hero.hp || "";
    document.getElementById("h_dmg").value = hero.damage || "";
    document.getElementById("h_magic").value = hero.magic || "";
    document.getElementById("h_icon").value = hero.icon || "";
    document.getElementById("h_ability").value = hero.ability_name || "";
    document.getElementById("h_video").value = hero.video || "";
    document.getElementById("h_desc").value = hero.desc || "";
    
    // Скролл вверх к форме
    window.scrollTo({ top: 0, behavior: 'smooth' });
    // Появление кнопки удалить
    document.getElementById("btnDelete").classList.remove("hidden");
}

// 6. СОХРАНЕНИЕ (БЕЗ ДУБЛЕЙ)
async function saveHero(status) {
    const nameInput = document.getElementById("h_name");
    const payload = {
        id: currentHeroId, // Скрипт в таблице теперь сам проверит ID или Имя
        name: nameInput.value.trim(),
        class_type: document.getElementById("h_class").value,
        hp: document.getElementById("h_hp").value,
        damage: document.getElementById("h_dmg").value,
        magic: document.getElementById("h_magic").value,
        icon: document.getElementById("h_icon").value,
        ability_name: document.getElementById("h_ability").value,
        video: document.getElementById("h_video").value,
        desc: document.getElementById("h_desc").value,
        status: status
    };

    if (!payload.name) return alert("Введите имя героя!");

    const btn = status === 'published' ? document.getElementById("btnPub") : document.getElementById("btnDraft");
    const originalText = btn.innerText;
    btn.innerText = "⌛ Сохранение...";
    btn.disabled = true;

    try {
        await fetch(API_URL, {
            method: "POST",
            mode: "no-cors", 
            body: JSON.stringify(payload)
        });

        // Ждем 1.5 секунды, чтобы таблица успела записать, и обновляем всё
        setTimeout(async () => {
            await loadHeroes();
            btn.innerText = originalText;
            btn.disabled = false;
            alert("Готово!");
            if(status === 'published') showPage('heroes');
        }, 1500);

    } catch (err) {
        alert("Ошибка: " + err);
        btn.disabled = false;
        btn.innerText = originalText;
    }
}

async function deleteHero() {
    if (!currentHeroId) return;
    
    const heroName = document.getElementById("h_name").value;
    if (!confirm(`Вы точно хотите удалить героя "${heroName}"? Это действие нельзя отменить!`)) return;

    const btn = document.getElementById("btnDelete");
    btn.innerText = "Удаление...";
    btn.disabled = true;

    try {
        await fetch(API_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                id: currentHeroId,
                action: "delete" // Посылаем сигнал таблице, что это именно удаление
            })
        });

        setTimeout(async () => {
            await loadHeroes(); // Обновляем данные, чтобы удаленный герой исчез
            clearForm(); // Очищаем форму
            alert("Герой успешно удален!");
        }, 1500);

    } catch (e) {
        alert("Ошибка при удалении");
        btn.disabled = false;
        btn.innerText = "Удалить карточку";
    }
}
    
// Очистка
function clearForm() {
    document.querySelectorAll("#adminPage input, #adminPage textarea").forEach(el => el.value = "");
    currentHeroId = null;
    document.getElementById("btnDelete").classList.add("hidden");
}

// Навигация
function showPage(page) {
    document.getElementById("heroesPage").classList.add("hidden");
    document.getElementById("adminPage").classList.add("hidden");
    document.getElementById("discussPage").classList.add("hidden");

    if(page==="heroes") document.getElementById("heroesPage").classList.remove("hidden");
    if(page==="admin") document.getElementById("adminPage").classList.remove("hidden");
    if(page==="discuss") document.getElementById("discussPage").classList.remove("hidden");
}

document.getElementById("search").addEventListener("input", renderHeroes);

// Запуск
loadFromCache(); // Сначала кэш
loadHeroes();    // Потом запрос к Google
showPage("heroes");
setInterval(loadHeroes, 60000);   // Авто-проверка обновлений каждые 60 секунд (для синхронизации устройств)

</script>

<div class="fixed bottom-0 left-0 right-0 bg-[#020617] border-t border-slate-800 flex justify-around p-3 z-50">
    <button onclick="showPage('heroes')" class="flex flex-col items-center text-cyan-400">
        <span class="text-xs">Герои</span>
    </button>
    <button onclick="showPage('discuss')" class="flex flex-col items-center text-gray-400">
        <span class="text-xs">Обсуждение</span>
    </button>
    <button onclick="showPage('admin')" class="flex flex-col items-center text-red-400">
        <span class="text-xs">Админ</span>
    </button>
</div>

</body>
</html>
