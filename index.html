<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC Wiki</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#0f172a; color:white; font-family:sans-serif; }
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.1);
}
.input {
    background:#020617;
    border:1px solid #1e293b;
    padding:10px;
    border-radius:8px;
    width:100%;
}
</style>
</head>
<body class="p-4 pb-24">

<!-- HEADER -->
<div class="flex justify-between items-center mb-4">
    <h1 class="text-xl font-bold text-cyan-400">CSC Heroes</h1>
</div>

<!-- SEARCH -->
<input id="search" placeholder="Поиск героя..." class="input mb-4">

<!-- HERO LIST -->
<div id="heroesPage" class="grid grid-cols-2 gap-3">
    <p id="loading" class="col-span-2 text-center text-gray-400">Загрузка героев...</p>
</div>

<!-- DISCUSS -->
<div id="discussPage" class="hidden text-center mt-10 text-gray-400">
    В разработке 🚧
</div>

<!-- ADMIN PANEL -->
<div id="adminPage" class="hidden">
    <h2 class="text-lg font-bold mb-4">Админ панель</h2>

    <input id="h_name" class="input mb-2" placeholder="Имя">
    <input id="h_class" class="input mb-2" placeholder="Класс">
    <input id="h_hp" class="input mb-2" placeholder="HP">
    <input id="h_dmg" class="input mb-2" placeholder="Damage">
    <input id="h_magic" class="input mb-2" placeholder="Magic %">
    <input id="h_ability" class="input mb-2" placeholder="Название способности">
    <input id="h_icon" class="input mb-2" placeholder="Icon URL">
    <input id="h_video" class="input mb-2" placeholder="Video URL">
    <textarea id="h_desc" class="input mb-2" placeholder="Описание"></textarea>

    <div class="flex gap-2 mt-3">
        <button onclick="saveHero('draft')" class="bg-yellow-500 px-3 py-2 rounded w-full">Сохранить</button>
        <button onclick="saveHero('published')" class="bg-green-600 px-3 py-2 rounded w-full">Опубликовать</button>
    </div>
    <button onclick="clearForm()" class="bg-red-600 mt-3 w-full py-2 rounded">Очистить</button>

    <h3 class="mt-6 font-bold">Опубликованные</h3>
    <div id="adminPublished" class="grid grid-cols-2 gap-2"></div>

    <h3 class="mt-6 font-bold">Черновики</h3>
    <div id="adminDrafts" class="grid grid-cols-2 gap-2"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyi4q61FTW1jBH5PsegIXuUCWYvuVR0KWYYqxGgmE4zHd2offXmauAn510LFoQv0uZB/exec";

let ALL_HEROES = [];
let currentHeroId = null;

// Переключение страниц
function showPage(page) {
    document.getElementById("heroesPage").classList.add("hidden");
    document.getElementById("adminPage").classList.add("hidden");
    document.getElementById("discussPage").classList.add("hidden");

    if(page==="heroes") document.getElementById("heroesPage").classList.remove("hidden");
    if(page==="admin") document.getElementById("adminPage").classList.remove("hidden");
    if(page==="discuss") document.getElementById("discussPage").classList.remove("hidden");
}

// Поиск героев
document.getElementById("search").addEventListener("input", renderHeroes);

// Рендер списка героев (только опубликованные)
function renderHeroes() {
    const list = document.getElementById("heroesPage");
    list.innerHTML = "";
    const search = document.getElementById("search").value.toLowerCase();

    let filtered = ALL_HEROES.filter(hero => hero.status === "published" && hero.name && hero.name.toLowerCase().startsWith(search));

    filtered.sort((a,b)=>a.name.localeCompare(b.name));

    if(filtered.length === 0){
        list.innerHTML = `<p class="text-center col-span-2 text-gray-400">Ничего не найдено</p>`;
        return;
    }

    filtered.forEach(hero=>{
        list.innerHTML += `
            <div class="glass p-3 rounded-xl text-center">
                <img src="${hero.icon}" class="w-16 h-16 mx-auto mb-2 rounded">
                <div class="font-bold">${hero.name}</div>
                <div class="text-xs text-cyan-400">${hero.class_type}</div>
            </div>
        `;
    });
}

// Рендер админ-панели
function renderAdminLists() {
    const pub = document.getElementById("adminPublished");
    const draft = document.getElementById("adminDrafts");
    pub.innerHTML = ""; draft.innerHTML = "";

    ALL_HEROES.forEach(hero=>{
        const card = `<div onclick="editHero(${hero.id})" class="glass p-2 text-center text-sm cursor-pointer">${hero.name||"Без имени"}</div>`;
        if(hero.status==="published") pub.innerHTML += card;
        else draft.innerHTML += card;
    });
}

// Редактирование
function editHero(id){
    const hero = ALL_HEROES.find(h=>h.id==id);
    if(!hero) return;
    currentHeroId = hero.id;

    document.getElementById("h_name").value = hero.name || "";
    document.getElementById("h_class").value = hero.class_type || "";
    document.getElementById("h_hp").value = hero.hp || "";
    document.getElementById("h_dmg").value = hero.damage || "";
    document.getElementById("h_magic").value = hero.magic || "";
    document.getElementById("h_icon").value = hero.icon || "";
    document.getElementById("h_ability").value = hero.ability_name || "";
    document.getElementById("h_video").value = hero.video || "";
    document.getElementById("h_desc").value = hero.desc || "";
}

// Загрузка героев
async function loadHeroes(){
    try {
        const res = await fetch(API_URL);
        ALL_HEROES = await res.json();
    } catch(e){}
    renderHeroes();
    renderAdminLists();
}

// Сохранение
async function saveHero(status){
    const payload = {
        id: currentHeroId,
        name: document.getElementById("h_name").value,
        class_type: document.getElementById("h_class").value,
        hp: document.getElementById("h_hp").value,
        damage: document.getElementById("h_dmg").value,
        magic: document.getElementById("h_magic").value,
        icon: document.getElementById("h_icon").value,
        ability_name: document.getElementById("h_ability").value,
        video: document.getElementById("h_video").value,
        desc: document.getElementById("h_desc").value,
        status
    };

    try{
        const res = await fetch(API_URL,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(payload)
        });
        const data = await res.json();
        if(data.id) currentHeroId = data.id;
        alert("Сохранено: "+data.status);
        await loadHeroes();
    } catch(err){
        alert("Ошибка: "+err);
    }
}

// Очистка формы
function clearForm(){
    document.querySelectorAll("#adminPage input,#adminPage textarea").forEach(el=>el.value="");
    currentHeroId=null;
}

// Старт
showPage("heroes");
loadHeroes();
</script>

<!-- Нижнее меню -->
<div class="fixed bottom-0 left-0 right-0 bg-[#020617] border-t border-slate-800 flex justify-around p-2">
    <button onclick="showPage('heroes')" class="text-cyan-400">Герои</button>
    <button onclick="showPage('discuss')" class="text-gray-400">Обсуждение</button>
    <button onclick="showPage('admin')" class="text-red-400">Админ</button>
</div>

</body>
</html>
